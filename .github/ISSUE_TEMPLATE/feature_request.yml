name: Feature request
description: Suggest a new check, output format, or workflow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What skill-authoring pain should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the finding code, report output, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Example skill input
      description: Share a minimal SKILL.md or directory shape if relevant.
